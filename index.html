<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PokeMMO Master Dex Checklist</title>
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-color: #ffffff;
            --text-muted: #aaaaaa;
            --accent-color: #ff5353;
            --captured-color: #2e7d32;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        h1 {
            color: var(--accent-color);
            margin-bottom: 10px;
        }

        .search-container {
            max-width: 500px;
            margin: 0 auto 30px auto;
        }

        .search-bar {
            width: 100%;
            padding: 12px 20px;
            font-size: 16px;
            border-radius: 25px;
            border: 2px solid #333;
            background-color: #222;
            color: #fff;
            box-sizing: border-box;
        }

        .search-bar:focus {
            border-color: var(--accent-color);
            outline: none;
        }

        .region-section {
            margin-bottom: 40px;
        }

        .region-title {
            border-bottom: 2px solid var(--accent-color);
            padding-bottom: 5px;
            margin-bottom: 20px;
            font-size: 24px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .dex-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 15px;
        }

        .pokemon-card {
            background-color: var(--card-bg);
            border-radius: 10px;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            transition: transform 0.2s, background-color 0.3s, border-color 0.3s;
            border: 2px solid transparent;
            user-select: none;
            position: relative;
        }

        .pokemon-card:hover {
            transform: translateY(-3px);
        }

        /* Sprite animado o estático */
        .pokemon-sprite {
            width: 64px;
            height: 64px;
            margin: 0 auto 10px auto;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .pokemon-sprite img {
            max-width: 100%;
            max-height: 100%;
        }

        .pokemon-id {
            font-size: 12px;
            color: var(--text-muted);
            display: block;
            margin-bottom: 5px;
        }

        .pokemon-name {
            font-weight: bold;
            font-size: 15px;
        }

        /* Estado Capturado */
        .pokemon-card.captured {
            background-color: rgba(46, 125, 50, 0.2);
            border-color: var(--captured-color);
        }

        .pokemon-card.captured .pokemon-name {
            color: #81c784;
        }

        /* Ocultar por buscador */
        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>

    <header>
        <h1>PokeMMO Master Dex</h1>
        <p>Registra tu progreso de captura para las 5 regiones</p>
        
        <div class="search-container">
            <input type="text" id="searchBar" class="search-bar" placeholder="Buscar Pokémon por nombre o ID...">
        </div>
    </header>

    <main id="dexContainer">
        <!-- Las regiones se inyectarán dinámicamente aquí para asegurar que no haya duplicados -->
    </main>

    <script>
        // Datos maestros de la Pokédex estructurados por región (Sin repeticiones de IDs)
        const pokedexData = [
            {
                region: "Kanto",
                pokemon: [
                    { id: 1, name: "Bulbasaur" },
                    { id: 2, name: "Ivysaur" },
                    { id: 3, name: "Venusaur" },
                    { id: 4, name: "Charmander" },
                    { id: 5, name: "Charmeleon" },
                    { id: 6, name: "Charizard" },
                    { id: 7, name: "Squirtle" },
                    { id: 8, name: "Wartortle" },
                    { id: 9, name: "Blastoise" },
                    { id: 25, name: "Pikachu" }
                    // Aquí continuaremos añadiendo la lista completa de Kanto de forma exacta
                ]
            },
            {
                region: "Johto",
                pokemon: [
                    { id: 152, name: "Chikorita" },
                    { id: 153, name: "Bayleef" },
                    { id: 154, name: "Meganium" },
                    { id: 155, name: "Cyndaquil" },
                    { id: 156, name: "Quilava" },
                    { id: 157, name: "Typhlosion" },
                    { id: 158, name: "Totodile" },
                    { id: 159, name: "Croconaw" },
                    { id: 160, name: "Feraligatr" }
                    // Aquí continuaremos añadiendo la lista completa de Johto sin duplicar IDs anteriores
                ]
            }
            // Agregaremos Hoenn, Sinnoh y Teselia manteniendo el orden numérico estricto de la Dex Nacional
        ];

        // Cargar IDs capturados desde el almacenamiento local del navegador
        let capturedPokemon = JSON.parse(localStorage.getItem('pokemmo_captured')) || [];

        const dexContainer = document.getElementById('dexContainer');
        const searchBar = document.getElementById('searchBar');

        // Función para renderizar la interfaz
        function renderDex() {
            dexContainer.innerHTML = '';

            pokedexData.forEach(regionData => {
                const section = document.createElement('section');
                section.className = 'region-section';

                const title = document.createElement('h2');
                title.className = 'region-title';
                title.textContent = regionData.region;
                section.appendChild(title);

                const grid = document.createElement('div');
                grid.className = 'dex-grid';

                regionData.pokemon.forEach(poke => {
                    const card = document.createElement('div');
                    card.className = 'pokemon-card';
                    card.dataset.id = poke.id;
                    card.dataset.name = poke.name.toLowerCase();

                    // Comprobar si ya está marcado como capturado
                    if (capturedPokemon.includes(poke.id)) {
                        card.classList.add('captured');
                    }

                    // Configuración de la ruta para tus GIFs animados de PokeMMO
                    // Cambia la ruta 'sprites/' por la carpeta donde guardes tus archivos si es necesario
                    const spriteUrl = `sprites/${poke.id}.gif`;

                    card.innerHTML = `
                        <div class="pokemon-id">#${String(poke.id).padStart(3, '0')}</div>
                        <div class="pokemon-sprite">
                            <img src="${spriteUrl}" alt="${poke.name}" onerror="this.src='https://via.placeholder.com/64?text=?';">
                        </div>
                        <div class="pokemon-name">${poke.name}</div>
                    `;

                    // Evento al hacer click para marcar/desmarcar
                    card.addEventListener('click', () => toggleCaptured(poke.id, card));

                    grid.appendChild(card);
                });

                section.appendChild(grid);
                dexContainer.appendChild(section);
            });
        }

        // Lógica para guardar o quitar de la lista de capturados
        function toggleCaptured(id, card) {
            if (capturedPokemon.includes(id)) {
                capturedPokemon = capturedPokemon.filter(pId => pId !== id);
                card.classList.remove('captured');
            } else {
                capturedPokemon.push(id);
                card.classList.add('captured');
            }
            localStorage.setItem('pokemmo_captured', JSON.stringify(capturedPokemon));
        }

        // Lógica en tiempo real del buscador
        searchBar.addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase().trim();
            const cards = document.querySelectorAll('.pokemon-card');

            cards.forEach(card => {
                const name = card.dataset.name;
                const id = card.dataset.id;

                if (name.includes(query) || id.includes(query)) {
                    card.classList.remove('hidden');
                } else {
                    card.classList.add('hidden');
                }
            });

            // Ocultar secciones de regiones si no tienen ningún Pokémon visible
            const sections = document.querySelectorAll('.region-section');
            sections.forEach(section => {
                const visibleCards = section.querySelectorAll('.pokemon-card:not(.hidden)');
                if (visibleCards.length === 0 && query !== '') {
                    section.classList.add('hidden');
                } else {
                    section.classList.remove('hidden');
                }
            });
        });

        // Inicializar la aplicación al cargar
        renderDex();
    </script>
</body>
</html>
