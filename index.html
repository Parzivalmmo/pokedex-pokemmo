<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Pokédex Checklist - Kanto a Teselia</title>
    <style>
        :root {
            --kanto-color: #ff4d4d;
            --johto-color: #ffcc00;
            --hoenn-color: #33cc33;
            --sinnoh-color: #3399ff;
            --teselia-color: #9933ff;
            --bg-color: #121214;
            --card-bg: #1a1a1e;
            --text-color: #e1e1e6;
            --text-secondary: #a8a8b3;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
        }

        header {
            background: linear-gradient(135deg, #202024, #121214);
            border: 1px solid #29292e;
            padding: 25px;
            border-radius: 12px;
            text-align: center;
            margin-bottom: 30px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        header h1 {
            margin: 0;
            font-size: 28px;
            letter-spacing: 1px;
            background: linear-gradient(45deg, #ff4d4d, #3399ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        header p {
            color: var(--text-secondary);
            margin: 8px 0 0 0;
            font-size: 14px;
        }

        .stats-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 15px;
            flex-wrap: wrap;
        }

        .stat-badge {
            background: #29292e;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: bold;
            border: 1px solid #3e3e42;
        }

        .region-nav {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }

        .nav-btn {
            background: #202024;
            color: var(--text-color);
            border: 1px solid #29292e;
            padding: 10px 18px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s ease;
        }

        .nav-btn:hover {
            background: #29292e;
            transform: translateY(-2px);
        }

        .region-section {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 35px;
            border: 1px solid #29292e;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .region-title {
            font-size: 22px;
            margin-top: 0;
            padding-bottom: 10px;
            border-bottom: 2px solid #29292e;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .kanto .region-title { color: var(--kanto-color); }
        .johto .region-title { color: var(--johto-color); }
        .hoenn .region-title { color: var(--hoenn-color); }
        .sinnoh .region-title { color: var(--sinnoh-color); }
        .teselia .region-title { color: var(--teselia-color); }

        .counter {
            font-size: 14px;
            color: var(--text-secondary);
            background: #202024;
            padding: 4px 10px;
            border-radius: 12px;
        }

        .pokedex-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 12px;
            margin-top: 15px;
        }

        .pkmn-card {
            background: #202024;
            border: 1px solid #29292e;
            border-radius: 8px;
            padding: 12px;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            user-select: none;
            transition: all 0.2s ease;
        }

        .pkmn-card:hover {
            border-color: #3e3e42;
            background: #252529;
        }

        .pkmn-card input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: #4caf50;
        }

        .pkmn-info {
            display: flex;
            flex-direction: column;
        }

        .pkmn-num {
            font-size: 11px;
            color: var(--text-secondary);
            font-family: monospace;
        }

        .pkmn-name {
            font-size: 14px;
            font-weight: 500;
        }

        /* Estilo para cuando el Pokémon ya está atrapado */
        .pkmn-card.caught {
            background: rgba(76, 175, 80, 0.1);
            border-color: rgba(76, 175, 80, 0.4);
        }

        .pkmn-card.caught .pkmn-name {
            text-decoration: line-through;
            color: #7ab87d;
        }

        html {
            scroll-behavior: smooth;
        }
    </style>
</head>
<body>

<header>
    <h1>Pokédex Master Checklist</h1>
    <p>Seguimiento de capturas para Kanto, Johto, Hoenn, Sinnoh y Teselia (Sin duplicados)</p>

        <div class="stat-badge">Total Atrapados: <span id="global-counter">0</span> / 649</div>
