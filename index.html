<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PokeMMO PokeDex</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #121212;
            color: #ffffff;
            padding: 20px;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        header h1 {
            color: #ffcb05;
            text-shadow: 2px 2px #3b4cca;
            margin-bottom: 10px;
        }

        .stats {
            font-size: 1.1rem;
            color: #aaa;
        }

        /* Contenedor de la Grid */
        .pokedex-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 15px;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Tarjeta de Pokémon */
        .pokemon-card {
            background-color: #1e1e1e;
            border: 2px solid #333;
            border-radius: 10px;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            transition: transform 0.2s, border-color 0.2s, opacity 0.2s;
            user-select: none;
            position: relative;
        }

        .pokemon-card:hover {
            transform: translateY(-5px);
            border-color: #ffcb05;
        }

        .pokemon-img {
            width: 96px;
            height: 96px;
            image-rendering: pixelated; /* Estilo retro/pixel art */
        }

        .pokemon-id {
            font-size: 0.8rem;
            color: #888;
            position: absolute;
            top: 8px;
            left: 8px;
        }

        .pokemon-name {
            font-size: 0.95rem;
            font-weight: bold;
            text-transform: capitalize;
            margin-top: 8px;
        }

        /* Estado: NO CAPTURADO (Por defecto se ve un poco apagado o normal, tú decides) */
        .pokemon-card {
            opacity: 0.6;
            filter: grayscale(40%);
        }

        /* Estado: CAPTURADO */
        .pokemon-card.captured {
            opacity: 1;
            filter: grayscale(0%);
            border-color: #4caf50;
            background-color: #142915;
            box-shadow: 0 0 10px rgba(76, 175, 80, 0.2);
        }

        .pokemon-card.captured::after {
            content: "✓";
            position: absolute;
            top: 8px;
            right: 10px;
            color: #4caf50;
            font-weight: bold;
            font-size: 1.1rem;
        }
    </style>
</head>
<body>

    <header>
        <h1>Pokédex de Captura</h1>
        <div class="stats">
            Capturados: <span id="captured-count">0</span> / <span id="total-count">0</span>
        </div>
    </header>

    <div class="pokedex-grid" id="pokedex"></div>

    <script>
        const pokedexContainer = document.getElementById('pokedex');
        const capturedCountEl = document.getElementById('captured-count');
        const totalCountEl = document.getElementById('total-count');

        // Definimos cuántos Pokémon queremos cargar (Por ejemplo, de Kanto a Teselia/Unova son 649)
        const TOTAL_POKEMON = 649; 

        // Cargar la lista de IDs capturados desde el almacenamiento local del navegador
        let capturedPokemon = JSON.parse(localStorage.getItem('capturedPokemon')) || [];

        // Función principal para inicializar la Pokédex
        async function initPokedex() {
            totalCountEl.textContent = TOTAL_POKEMON;
            updateStats();

            // Generamos las tarjetas en orden sin que se repitan
            for (let i = 1; i <= TOTAL_POKEMON; i++) {
                createPokemonCard(i);
            }
        }

        // Función para crear la interfaz visual de cada Pokémon usando la API
        function createPokemonCard(id) {
            const card = document.createElement('div');
            card.classList.add('pokemon-card');
            card.dataset.id = id;

            // Formatear ID (ejemplo: 1 -> #001)
            const formattedId = String(id).padStart(3, '0');

            // URL del sprite oficial (Estilo Black & White / Animado o estático de quinta generación)
            const imageUrl = `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${id}.png`;

            // Verificamos si ya estaba capturado previamente
            if (capturedPokemon.includes(id)) {
                card.classList.add('captured');
            }

            // Nombre temporal mientras carga la API de nombres, o mapeo rápido
            // Para no hacer 649 peticiones simultáneas de red pesadas, usamos los datos directos del sprite
            // Nota: Si quieres los nombres en español exactos, se puede expandir con un fetch por ID.
            // Para mantener la velocidad instantánea, usaremos una lista de nombres o los traeremos dinámicamente.
            
            card.innerHTML = `
                <div class="pokemon-id">#${formattedId}</div>
                <img class="pokemon-img" src="${imageUrl}" alt="Pokemon ${id}" loading="lazy">
                <div class="pokemon-name" id="name-${id}">Cargando...</div>
            `;

            // Evento para marcar/desmarcar capturado al hacer clic
            card.addEventListener('click', () => toggleCapture(id, card));

            pokedexContainer.appendChild(card);

            // Buscamos el nombre real del Pokémon de forma asíncrona para no congelar la página
            fetchPokemonName(id);
        }

        // Trae el nombre de la API (puedes cambiar 'en' por 'es' si requieres nombres traducidos)
        async function fetchPokemonName(id) {
            try {
                const res = await fetch(`https://pokeapi.co/api/v2/pokemon-species/${id}/`);
                const data = await res.json();
                // Buscar el nombre en español
                const spanishName = data.names.find(n => n.language.name === 'es');
                document.getElementById(`name-${id}`).textContent = spanishName ? spanishName.name : data.name;
            } catch (error) {
                document.getElementById(`name-${id}`).textContent = `Nº ${id}`;
            }
        }

        // Función para cambiar el estado de captura
        function toggleCapture(id, cardElement) {
            if (capturedPokemon.includes(id)) {
                // Si ya está, lo quitamos
                capturedPokemon = capturedPokemon.filter(pId => pId !== id);
                cardElement.classList.remove('captured');
            } else {
                // Si no está, lo añadimos
                capturedPokemon.push(id);
                cardElement.classList.add('captured');
            }

            // Guardar en localStorage
            localStorage.setItem('capturedPokemon', JSON.stringify(capturedPokemon));
            updateStats();
        }

        // Actualizar el contador superior
        function updateStats() {
            capturedCountEl.textContent = capturedPokemon.length;
        }

        // Arrancar la app
        initPokedex();
    </script>
</body>
</html>
