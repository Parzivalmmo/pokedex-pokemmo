<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokédex Checklist - PokéMMO</title>
    <style>
        :root {
            --bg-color: #121214;
            --card-bg: #1a1a1e;
            --text-color: #e1e1e6;
            --text-secondary: #a8a8b3;
            --kanto: #ff4d4d;
            --johto: #ffcc00;
            --hoenn: #33cc33;
            --sinnoh: #3399ff;
            --teselia: #9933ff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
        }

        header {
            background: linear-gradient(135deg, #202024, #121214);
            border: 1px solid #29292e;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            margin-bottom: 25px;
        }

        header h1 {
            margin: 0;
            font-size: 26px;
            background: linear-gradient(45deg, #ff4d4d, #3399ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .stats {
            margin-top: 10px;
            font-size: 16px;
            font-weight: bold;
            color: #4caf50;
        }

        .region-nav {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }

        .nav-btn {
            background: #202024;
            color: var(--text-color);
            border: 1px solid #29292e;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.2s;
        }

        .nav-btn:hover { background: #29292e; }

        .region-section {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 30px;
            border: 1px solid #29292e;
        }

        .region-title {
            font-size: 20px;
            margin-top: 0;
            padding-bottom: 10px;
            border-bottom: 2px solid #29292e;
        }

        .kanto h2 { color: var(--kanto); }
        .johto h2 { color: var(--johto); }
        .hoenn h2 { color: var(--hoenn); }
        .sinnoh h2 { color: var(--sinnoh); }
        .teselia h2 { color: var(--teselia); }

        .pokedex-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 10px;
            margin-top: 15px;
        }

        .pkmn-card {
            background: #202024;
            border: 1px solid #29292e;
            border-radius: 8px;
            padding: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            user-select: none;
            transition: 0.2s;
        }

        .pkmn-card:hover { border-color: #3e3e42; }

        .pkmn-card input {
            width: 16px;
            height: 16px;
            cursor: pointer;
            accent-color: #4caf50;
        }

        .pkmn-info { display: flex; flex-direction: column; }
        .pkmn-num { font-size: 11px; color: var(--text-secondary); font-family: monospace; }
        .pkmn-name { font-size: 13px; font-weight: 500; }

        .pkmn-card.caught {
            background: rgba(76, 175, 80, 0.1);
            border-color: rgba(76, 175, 80, 0.4);
        }
        .pkmn-card.caught .pkmn-name {
            text-decoration: line-through;
            color: #7ab87d;
        }
    </style>
</head>
<body>

<header>
    <h1>Pokédex Master Checklist</h1>
    <p>Seguimiento sin duplicados (Kanto hasta Teselia)</p>
    <div class="stats">Atrapados: <span id="global-counter">0</span> / 649</div>
</header>

<div class="region-nav">
    <button class="nav-btn" onclick="document.getElementById('kanto-sec').scrollIntoView({behavior: 'smooth'})">Kanto</button>
    <button class="nav-btn" onclick="document.getElementById('johto-sec').scrollIntoView({behavior: 'smooth'})">Johto</button>
    <button class="nav-btn" onclick="document.getElementById('hoenn-sec').scrollIntoView({behavior: 'smooth'})">Hoenn</button>
    <button class="nav-btn" onclick="document.getElementById('sinnoh-sec').scrollIntoView({behavior: 'smooth'})">Sinnoh</button>
    <button class="nav-btn" onclick="document.getElementById('teselia-sec').scrollIntoView({behavior: 'smooth'})">Teselia</button>
</div>

<div id="pokedex-app">
    <div id="kanto-sec" class="region-section kanto"><h2>Kanto (Gen 1)</h2><div class="pokedex-grid" id="kanto-grid"></div></div>
    <div id="johto-sec" class="region-section johto"><h2>Johto (Gen 2)</h2><div class="pokedex-grid" id="johto-grid"></div></div>
    <div id="hoenn-sec" class="region-section hoenn"><h2>Hoenn (Gen 3)</h2><div class="pokedex-grid" id="hoenn-grid"></div></div>
    <div id="sinnoh-sec" class="region-section sinnoh"><h2>Sinnoh (Gen 4)</h2><div class="pokedex-grid" id="sinnoh-grid"></div></div>
    <div id="teselia-sec" class="region-section teselia"><h2>Teselia (Gen 5)</h2><div class="pokedex-grid" id="teselia-grid"></div></div>
</div>
